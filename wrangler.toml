name = "holstonmeet"
compatibility_date = "2026-06-11"
main = "./build/index.js"
compatibility_flags = ["nodejs_compat"]

[site]
  bucket = "./public"

[vars]
CALLS_APP_ID = "YOUR_CALLS_SFU_APP_ID_HERE"

[[durable_objects.bindings]]
name = "rooms"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
deleted_classes = ["RateLimiter"]
